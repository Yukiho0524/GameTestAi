# 來源 rec_20260702_091734.mp4（1080p，getevent 實測點擊）
# 進場用已驗證 video1 模板；補回 getevent 漏抓的「大地圖點布置」導覽；佈置各步用點擊前一幀裁圖。
# 純色點(進入鈕背景/青綠色帶)→tap_scene(座標+畫面驗證)；有特徵→tap_image。
name: "20260702_01"
description: 冷啟動→進入遊戲→大地圖→開布置→佈置畫面操作
step_delay: 1.0

steps:
  # ===== 進場（穩健：多次補點，混 tap_image 與已知座標 tap_scene）=====
  - action: tap_image
    name: 關更新提示(若有)
    template: common/btn_close_x.png
    timeout: 20
    critical: false
    press: auto

  - action: wait_image
    name: 等標題畫面
    template: video1/title_logo.png
    timeout: 90
    critical: false

  - action: wait
    name: 等備貨/載入
    seconds: 8

  - action: tap_image
    name: 進入遊戲1
    template: video1/btn_enter_game.png
    timeout: 40
    critical: false
    press: auto

  - action: wait
    name: w
    seconds: 6

  - action: tap_scene
    name: 進入遊戲2(已知座標)
    x: 0.482
    y: 0.7785
    reference: refs/rec_20260702_091734/scene_00.png
    scene_threshold: 0.55
    press: auto

  - action: wait
    name: w
    seconds: 6

  - action: tap_image
    name: 進入遊戲3
    template: video1/btn_enter_game.png
    timeout: 12
    critical: false
    press: auto

  - action: wait
    name: w
    seconds: 6

  - action: tap_scene
    name: 進入遊戲4(已知座標)
    x: 0.482
    y: 0.7785
    reference: refs/rec_20260702_091734/scene_00.png
    scene_threshold: 0.55
    press: auto

  - action: wait
    name: 等載入完成
    seconds: 8

  - action: wait_image
    name: 確認已進入遊戲(大地圖)
    template: rec_20260702_091734/city_hud.png
    timeout: 90
    critical: true
    threshold: 0.6

  # ===== 補回漏抓：大地圖點「布置」進佈置畫面 =====
  - action: tap_image
    name: 大地圖點「布置」進佈置畫面〔補回 getevent 漏抓〕
    template: rec_20260702_091734/btn_layout.png
    timeout: 20
    critical: true
    press: auto
    threshold: 0.55
    scene:
      template: refs/rec_20260702_091734/scene_citymap.png
      timeout: 15
      threshold: 0.45

  - action: wait
    name: 等佈置畫面開啟
    seconds: 3

  # ===== 佈置畫面操作（生成；純色→tap_scene，有特徵→tap_image；點擊前一幀裁圖）=====
  - action: tap_scene
    name: 點擊(座標) t=51.8s〔青綠色帶,無可辨識圖案〕
    x: 0.803
    y: 0.9129
    reference: refs/rec_20260702_091734/scene_01.png
    scene_threshold: 0.45
    press: auto

  - action: wait
    name: 等待 3s
    seconds: 3.2

  - action: tap_image
    name: 點擊 t=55.0s
    template: rec_20260702_091734/tap02.png
    timeout: 12
    press: auto
    threshold: 0.6
    scene:
      template: refs/rec_20260702_091734/scene_02.png
      timeout: 20

  - action: wait
    name: 等待 4s
    seconds: 3.5

  - action: swipe
    name: 滑動 t=58.6s
    x1: 0.7681
    y1: 0.683
    x2: 0.7655
    y2: 0.1131
    duration_ms: 960
    scene:
      template: refs/rec_20260702_091734/scene_03.png
      timeout: 20

  - action: wait
    name: 等待 2s
    seconds: 2.2

  - action: tap_image
    name: 點擊 t=60.8s
    template: rec_20260702_091734/tap04.png
    timeout: 12
    press: auto
    threshold: 0.6
    scene:
      template: refs/rec_20260702_091734/scene_04.png
      timeout: 20

  - action: wait
    name: 等待 3s
    seconds: 3.1

  - action: tap_image
    name: 點擊 t=63.9s
    template: rec_20260702_091734/tap05.png
    timeout: 12
    press: auto
    threshold: 0.6
    scene:
      template: refs/rec_20260702_091734/scene_05.png
      timeout: 20

  - action: wait
    name: 等待 1s
    seconds: 1.3

  - action: tap_image
    name: 點擊 t=65.2s
    template: rec_20260702_091734/tap06.png
    timeout: 12
    press: auto
    threshold: 0.6
    scene:
      template: refs/rec_20260702_091734/scene_06.png
      timeout: 20

  - action: swipe
    name: 滑動 t=66.2s
    x1: 0.8082
    y1: 0.7739
    x2: 0.8166
    y2: 0.3031
    duration_ms: 782
    scene:
      template: refs/rec_20260702_091734/scene_07.png
      timeout: 20

  - action: wait
    name: 等待 2s
    seconds: 1.8

  - action: tap_image
    name: 點擊 t=67.9s
    template: rec_20260702_091734/tap08.png
    timeout: 12
    press: auto
    threshold: 0.6
    scene:
      template: refs/rec_20260702_091734/scene_08.png
      timeout: 20

  - action: wait
    name: 等待 3s
    seconds: 2.9

  - action: tap_image
    name: 點擊 t=70.9s(返回)
    template: rec_20260702_091734/tap09.png
    timeout: 12
    press: auto
    scene:
      template: refs/rec_20260702_091734/scene_09.png
      timeout: 20
