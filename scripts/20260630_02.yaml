# 由 Claude 從 video2.mp4 分析產生（第二版：改用 tap_image/tap_scene，去除盲猜座標）
# 受測遊戲（本片錄製於 960x540）
# 流程：載入 → 標題(進入遊戲) → 進遊戲主畫面 → 開「管理面板」→ 瀏覽分頁 → 返回主畫面
#
# 點擊策略：
#   - 進入遊戲 / 分頁切換 → tap_image（在當前畫面找到該元件再點，跨解析度最準）
#   - 管理面板「入口」無法從影片確定 → tap_scene（畫面與主畫面相符才點，不符不點）
#   - 關閉面板 → 用 Android 返回鍵（比猜座標可靠）
#   - 進場等待用 assert_image 輪詢，不用固定秒數
#
# ⚠️ 仍待裝置校正：管理面板「入口座標」（tap_scene 的 x,y）。
#    請 py run.py test scripts\20260630_02.yaml --once 後看 diagnose；
#    若面板沒開，多半是入口座標要調。

name: 20260630_02
description: 進入遊戲 → 管理面板（分頁2/分頁3）瀏覽
step_delay: 1.0

anchor:
  template: video1/title_logo.png
  timeout: 120

steps:
  # === 進入遊戲 ===
  - action: tap_image
    name: 點擊進入遊戲
    template: video1/btn_enter_game.png
    timeout: 60
    press: auto
    reference: refs/20260630_02/01_title.png

  - action: wait
    name: 緩衝
    seconds: 2

  # 輪詢等待主畫面 HUD 出現（吸收第二段載入），這步判成敗
  - action: assert_image
    name: 確認進入主畫面
    template: video1/main_hud.png
    timeout: 90
    critical: true
    reference_after: refs/20260630_02/04_ingame.png

  - action: screenshot
    name: 主畫面截圖

  # === 開啟管理面板（入口不確定 → 場景相符才點；座標需校正）===
  - action: tap_scene
    name: 開啟管理面板    # [需校正] 主畫面右下選單入口座標
    reference: refs/20260630_02/05_city_before.png
    x: 0.93
    y: 0.90
    scene_threshold: 0.6
    press: auto

  - action: wait_image
    name: 確認管理面板開啟
    template: video2/panel_goods.png
    timeout: 12
    critical: true

  - action: screenshot
    name: 分頁1(預設)截圖

  # === 切到「分頁2」（找到該分頁圖示再點）===
  - action: tap_image
    name: 點分頁2
    template: video2/tab_preorder.png
    timeout: 8
    press: auto
    reference: refs/20260630_02/06_goods.png

  - action: wait
    name: 等內容載入
    seconds: 1.0

  - action: screenshot
    name: 分頁2截圖

  # === 切到「分頁3」 ===
  - action: tap_image
    name: 點分頁3
    template: video2/tab_stock.png
    timeout: 8
    press: auto

  - action: wait
    name: 等內容載入
    seconds: 1.0

  - action: screenshot
    name: 分頁3截圖

  # === 關閉面板：用返回鍵（比猜座標可靠）===
  - action: key
    name: 返回鍵關閉面板
    keycode: back

  - action: wait
    name: 等待返回主畫面
    seconds: 1.5

  - action: assert_image
    name: 確認返回主畫面
    template: video1/main_hud.png
    timeout: 10
    critical: true

  - action: screenshot
    name: 結束截圖
