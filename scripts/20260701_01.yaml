name: 20260701_01
description: 冷啟動→點進入遊戲→主城地圖→開啟商品管理→切換预约进货分頁
step_delay: 1.5

anchor:
  template: rec_20260701_092033/title_logo_sc.png
  timeout: 90

steps:
  - action: wait_image
    name: 等待標題畫面出現
    template: rec_20260701_092033/title_logo_sc.png
    timeout: 90
    reference: refs/rec_20260701_092033/title_screen.png

  - action: tap_image
    name: 點擊進入遊戲
    template: rec_20260701_092033/btn_enter_game_sc.png
    timeout: 10
    reference: refs/rec_20260701_092033/title_screen.png

  - action: wait_image
    name: 等待主城地圖載入完成
    template: rec_20260701_092033/main_hud_city.png
    timeout: 120

  - action: assert_image
    name: 確認主城地圖畫面
    template: rec_20260701_092033/main_hud_city.png
    critical: true
    reference: refs/rec_20260701_092033/main_city.png

  - action: tap_image
    name: 點擊商品管理按鈕
    template: rec_20260701_092033/btn_merchandise_mgmt.png
    timeout: 10
    reference: refs/rec_20260701_092033/main_city.png

  - action: assert_image
    name: 確認商品管理面板開啟
    template: rec_20260701_092033/panel_merchandise_header.png
    critical: true
    reference: refs/rec_20260701_092033/merchandise_panel.png

  - action: tap_image
    name: 點擊预约进货分頁
    template: rec_20260701_092033/tab_reserve_ordering.png
    timeout: 10

  - action: assert_image
    name: 確認切換到预约进货頁面
    template: rec_20260701_092033/tab_reserve_ordering_active.png
    critical: true
    reference: refs/rec_20260701_092033/reserve_ordering.png

  - action: screenshot
    name: 结束截圖
