# 由 Claude 從 video1.mp4 分析產生
# 遊戲：悍利商店 POCKET STORE（Gamania）橫版 1600x900
# 流程：黑屏載入 → 標題(進入遊戲) → 左上驚嘆號長壓開 SRDebugger
#       → OPTIONS 分頁 → 輸入 AccountID=100 → Login → 關閉面板 → 進入遊戲 → 主畫面
#
# ⚠️ 座標多為影格估算（標 [需校正]），請用：
#      py run.py test scripts\20260630_01.yaml --once
#      py run.py diagnose
#    依建議微調；press:auto 會自動試短點/長壓。
# ⚠️ SRDebugger 觸發鈕（左上驚嘆號）半透明、影格看不清，開啟座標務必在裝置上確認。

name: 20260630_01
description: 悍利商店 除錯登入(AccountID 100)+進入遊戲+跨解析度適配檢查
step_delay: 1.0

# 冷啟動後先等標題畫面出現（吸收載入時間與起始錯位）
anchor:
  template: video1/title_logo.png
  timeout: 60

steps:
  # === 開 SRDebugger：左上驚嘆號「長壓」 ===
  - action: long_press
    name: 長壓左上驚嘆號開除錯面板   # [需校正] 確認驚嘆號實際座標
    x: 0.03
    y: 0.04
    duration_ms: 1200
    reference: refs/20260630_01/01_title.png

  - action: wait
    name: 等除錯面板開啟
    seconds: 1.5

  # === 切到 OPTIONS 分頁並登入 AccountID=100 ===
  - action: tap
    name: 點 OPTIONS 分頁          # [需校正] 左側邊欄第三項
    x: 0.16
    y: 0.52
    press: auto

  - action: tap
    name: 點 Enter AccountID 欄位   # [需校正]
    x: 0.36
    y: 0.27
    press: auto

  - action: input_text
    name: 輸入 AccountID 100
    text: "100"

  - action: tap
    name: 確定輸入                  # [需校正] 輸入框右側「確定」
    x: 0.97
    y: 0.93
    press: auto

  - action: tap_image
    name: 點 Login
    template: video1/btn_login.png
    timeout: 10
    press: auto
    reference: refs/20260630_01/05_debug_login.png

  - action: wait
    name: 等待登入完成
    seconds: 3

  - action: tap
    name: 關閉除錯面板             # [需校正] 右上角 X
    x: 0.975
    y: 0.05
    press: auto

  # === 進入遊戲 ===
  - action: tap_image
    name: 點擊進入遊戲
    template: video1/btn_enter_game.png
    timeout: 20
    press: auto

  - action: wait
    name: 等待進場載入
    seconds: 10

  # 確認真的進到遊戲主畫面（頂部資源列），這步判定成敗
  - action: assert_image
    name: 確認進入遊戲主畫面
    template: video1/main_hud.png
    timeout: 30
    critical: true
    reference_after: refs/20260630_01/08_ingame.png

  - action: screenshot
    name: 進入遊戲後截圖
