# 由 Claude 從 rec_20260630_161559.mp4 分析產生（960x540）
# 受測遊戲
# 流程：
#   冷啟動 → 啟動畫面 → 標題畫面
#   → 教程劇情自動播放（約 8 段，含進度條）→ 主畫面
#   → 管理面板（分頁1 → 分頁2 → 分頁3）→ 返回主畫面
#
# 備注：
#   - 教程劇情（frames 0016-0031）為自動播放，taps.json 為空，無需點擊推進
#   - 管理面板入口座標 (0.93, 0.90) 沿用 20260630_02 校正值
#   - rec_20260630_161559/main_hud.png 含資源數字；帳號資源不同時需更新模板
#
# ⚠ 待校正：
#   step「開啟管理面板」→ 主畫面右側管理按鈕確切座標

name: 20260630_04
description: 冷啟動→教程劇情自動播放→主畫面→管理面板（分頁1/分頁2/分頁3）
step_delay: 1.0

anchor:
  template: video1/title_logo.png
  timeout: 120

steps:
  # === 確認標題畫面（冷啟動後等待） ===
  - action: assert_image
    name: 確認標題畫面
    template: video1/title_logo.png
    timeout: 60
    critical: true
    reference_after: refs/rec_20260630_161559/00_title.png

  - action: screenshot
    name: 標題畫面截圖

  # === 等待主畫面出現（含自動播放教程劇情約 30 秒）===
  # 教程播放時右下角有浮水印；進入主畫面後消失
  - action: wait_image
    name: 等待主畫面HUD出現
    template: rec_20260630_161559/main_hud.png
    timeout: 120
    critical: true

  - action: assert_absent
    name: 確認教程載入畫面已結束
    template: rec_20260630_161559/tutorial_loading.png
    timeout: 5

  - action: screenshot
    name: 主畫面截圖

  # === 開啟管理面板（入口需校正）===
  - action: tap_scene
    name: 開啟管理面板    # [需校正] 主畫面右側管理選單座標
    reference: refs/rec_20260630_161559/02_mainmap.png
    x: 0.93
    y: 0.90
    scene_threshold: 0.55
    press: auto

  - action: wait_image
    name: 確認管理面板開啟
    template: video2/panel_goods.png
    timeout: 12
    critical: true

  - action: screenshot
    name: 管理面板-分頁1截圖

  # === 確認分頁1（面板預設分頁，成敗關鍵）===
  - action: assert_image
    name: 確認分頁1已選中
    template: rec_20260630_161559/tab_tab1.png
    timeout: 5
    critical: true
    reference_after: refs/rec_20260630_161559/03_tab1.png

  # === 切換到分頁2 ===
  - action: tap_image
    name: 點分頁2
    template: video2/tab_preorder.png
    timeout: 8
    press: auto
    reference: refs/rec_20260630_161559/03_tab1.png

  - action: wait
    name: 等分頁2載入
    seconds: 1.0

  - action: screenshot
    name: 分頁2截圖

  # === 切換到分頁3 ===
  - action: tap_image
    name: 點分頁3
    template: video2/tab_stock.png
    timeout: 8
    press: auto
    reference: refs/rec_20260630_161559/04_goods_preorder.png

  - action: wait
    name: 等分頁3載入
    seconds: 1.0

  - action: screenshot
    name: 分頁3截圖

  # === 關閉管理面板（返回鍵）===
  - action: key
    name: 返回鍵關閉管理面板
    keycode: back

  - action: wait
    name: 等待返回主畫面
    seconds: 1.5

  - action: assert_image
    name: 確認返回主畫面
    template: rec_20260630_161559/main_hud.png
    timeout: 10
    critical: true
    reference_after: refs/rec_20260630_161559/06_mainmap_end.png

  - action: screenshot
    name: 結束截圖
